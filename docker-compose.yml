services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: rebalance-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rebalance-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/rebalance?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

  mongodb:
    image: mongo:7
    container_name: rebalance-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: rebalance-mcp
    restart: unless-stopped
    environment:
      BACKEND_API_URL: http://backend:3001
      MCP_TRANSPORT: sse
      MCP_PORT: "3100"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3100/health').then(r=>{if(!r.ok)process.exit(1)})\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

  goclaw:
    image: ghcr.io/nextlevelbuilder/goclaw:latest
    container_name: rebalance-goclaw
    restart: unless-stopped
    ports:
      - "18790:18790"
    environment:
      GOCLAW_HOST: 0.0.0.0
      GOCLAW_PORT: 18790
      GOCLAW_GATEWAY_TOKEN: ${GOCLAW_GATEWAY_TOKEN:-}
      GOCLAW_ENCRYPTION_KEY: ${GOCLAW_ENCRYPTION_KEY:-}
      GOCLAW_POSTGRES_DSN: postgres://goclaw:${GOCLAW_DB_PASSWORD:-goclaw}@goclaw-postgres:5432/goclaw?sslmode=disable
      GOCLAW_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOCLAW_XAI_API_KEY: ${XAI_API_KEY:-}
      ENABLE_PYTHON: "true"
      ENABLE_NODE: "true"
      ENABLE_FULL_SKILLS: "true"
    volumes:
      - goclaw_data:/app/data
      - ./goclaw-skills:/app/workspace/skills
    depends_on:
      goclaw-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

  goclaw-ui:
    image: ghcr.io/nextlevelbuilder/goclaw-web:latest
    container_name: rebalance-goclaw-ui
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - goclaw
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - app-network

  goclaw-postgres:
    image: pgvector/pgvector:pg18
    container_name: rebalance-goclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: goclaw
      POSTGRES_PASSWORD: ${GOCLAW_DB_PASSWORD:-goclaw}
      POSTGRES_DB: goclaw
    volumes:
      - goclaw_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goclaw"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

  autoheal:
    image: willfarrell/autoheal
    container_name: rebalance-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 60
      AUTOHEAL_START_PERIOD: 120
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
  goclaw_data:
  goclaw_postgres_data:
