name: Deploy

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_API_KEY: ${{ secrets.APP_API_KEY }}
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
          APP_MONGO_PASSWORD: ${{ secrets.APP_MONGO_PASSWORD }}
          APP_BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          APP_BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          APP_BINANCE_SANDBOX: ${{ secrets.BINANCE_SANDBOX }}
          APP_OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          APP_OKX_API_SECRET: ${{ secrets.OKX_API_SECRET }}
          APP_OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          APP_BYBIT_API_KEY: ${{ secrets.BYBIT_API_KEY }}
          APP_BYBIT_API_SECRET: ${{ secrets.BYBIT_API_SECRET }}
          APP_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          APP_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APP_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          APP_GOCLAW_GATEWAY_TOKEN: ${{ secrets.GOCLAW_GATEWAY_TOKEN }}
          APP_GOCLAW_ENCRYPTION_KEY: ${{ secrets.GOCLAW_ENCRYPTION_KEY }}
          APP_GOCLAW_DB_PASSWORD: ${{ secrets.GOCLAW_DB_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          envs: APP_API_KEY,APP_ENCRYPTION_KEY,APP_MONGO_PASSWORD,APP_BINANCE_API_KEY,APP_BINANCE_API_SECRET,APP_BINANCE_SANDBOX,APP_OKX_API_KEY,APP_OKX_API_SECRET,APP_OKX_PASSPHRASE,APP_BYBIT_API_KEY,APP_BYBIT_API_SECRET,APP_TELEGRAM_BOT_TOKEN,APP_TELEGRAM_CHAT_ID,APP_ANTHROPIC_API_KEY,APP_XAI_API_KEY,APP_GOCLAW_GATEWAY_TOKEN,APP_GOCLAW_ENCRYPTION_KEY,APP_GOCLAW_DB_PASSWORD
          script: |
            set -e

            # Ensure Docker is installed
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            APP_DIR="/opt/rebalance-bot"

            # Clone or pull
            if [ -d "$APP_DIR" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            # Generate .env from GitHub Secrets (overwrite each deploy)
            MONGO_PW="${APP_MONGO_PASSWORD:-changeme-$(head -c 12 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9')}"
            cat > "$APP_DIR/.env" << ENVEOF
            API_PORT=3001
            API_KEY=${APP_API_KEY:-your-api-key-here}
            ENCRYPTION_KEY=${APP_ENCRYPTION_KEY:-abcdefghijklmnopqrstuvwxyz123456}
            BINANCE_API_KEY=${APP_BINANCE_API_KEY:-}
            BINANCE_API_SECRET=${APP_BINANCE_API_SECRET:-}
            BINANCE_SANDBOX=${APP_BINANCE_SANDBOX:-true}
            OKX_API_KEY=${APP_OKX_API_KEY:-}
            OKX_API_SECRET=${APP_OKX_API_SECRET:-}
            OKX_PASSPHRASE=${APP_OKX_PASSPHRASE:-}
            BYBIT_API_KEY=${APP_BYBIT_API_KEY:-}
            BYBIT_API_SECRET=${APP_BYBIT_API_SECRET:-}
            TELEGRAM_BOT_TOKEN=${APP_TELEGRAM_BOT_TOKEN:-}
            TELEGRAM_CHAT_ID=${APP_TELEGRAM_CHAT_ID:-}
            REBALANCE_THRESHOLD=5
            REBALANCE_COOLDOWN_HOURS=1
            MIN_TRADE_USD=10
            MAX_TRADE_USD=5000
            DAILY_LOSS_LIMIT_PCT=10
            MONGO_PASSWORD=${MONGO_PW}
            MONGODB_URI=mongodb://admin:${MONGO_PW}@mongodb:27017/rebalance?authSource=admin
            ANTHROPIC_API_KEY=${APP_ANTHROPIC_API_KEY:-}
            XAI_API_KEY=${APP_XAI_API_KEY:-}
            GOCLAW_GATEWAY_TOKEN=${APP_GOCLAW_GATEWAY_TOKEN:-}
            GOCLAW_ENCRYPTION_KEY=${APP_GOCLAW_ENCRYPTION_KEY:-}
            GOCLAW_DB_PASSWORD=${APP_GOCLAW_DB_PASSWORD:-goclaw}
            ENVEOF
            # Remove leading whitespace from heredoc
            sed -i 's/^            //' "$APP_DIR/.env"

            # Build new images while old containers keep running (no downtime during build)
            docker compose build

            # Rolling restart — only recreates containers with new images (~30s swap)
            docker compose up -d --wait --wait-timeout 180

            # Cleanup old images
            docker image prune -f 2>/dev/null || true

            # Show status
            docker compose ps
            echo "Deploy complete!"
