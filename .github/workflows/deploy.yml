name: Deploy

on:
  workflow_run:
    workflows: ["Backend Tests", "Frontend Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e

            # Ensure Docker is installed
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            APP_DIR="/opt/rebalance-bot"

            # Clone or pull
            if [ -d "$APP_DIR" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            # Create .env if not exists
            if [ ! -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env.example" "$APP_DIR/.env"
              echo "Created default .env — EDIT /opt/rebalance-bot/.env with real values!"
            fi

            # Ensure MONGO_PASSWORD exists in .env
            if ! grep -q "^MONGO_PASSWORD=" "$APP_DIR/.env"; then
              echo "MONGO_PASSWORD=changeme-$(head -c 12 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9')" >> "$APP_DIR/.env"
            fi

            # Build and deploy with Docker Compose
            docker compose build
            docker compose up -d
            docker compose ps

            echo "Deploy complete!"
