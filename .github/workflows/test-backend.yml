name: Backend Tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/test-backend.yml'
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  test:
    name: Backend
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    env:
      API_KEY: test-ci-key
      API_PORT: "3001"
      ENCRYPTION_KEY: abcdefghijklmnopqrstuvwxyz123456
      PAPER_TRADING: "true"
      MONGODB_URI: "mongodb://localhost:27017/rebalance-test"
      REBALANCE_THRESHOLD: "5"
      REBALANCE_COOLDOWN_HOURS: "1"
      MIN_TRADE_USD: "10"
      MAX_TRADE_USD: "5000"
      DAILY_LOSS_LIMIT_PCT: "10"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Seed test database
        run: bun run scripts/seed-dev-data.ts

      - name: Run tests
        run: bun test ./src/ --path-ignore-patterns='**/*.isolated.test.ts' --timeout 30000
        continue-on-error: false

      - name: Coverage
        if: always()
        run: bun test ./src/ --path-ignore-patterns='**/*.isolated.test.ts' --timeout 30000 --coverage --coverage-reporter=lcov --coverage-dir=coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage/lcov.info
