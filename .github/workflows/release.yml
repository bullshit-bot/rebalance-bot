name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write # to be able to publish a GitHub release
  issues: write # to be able to comment on released issues
  pull-requests: write # to be able to comment on released pull requests
  id-token: write # to enable use of OIDC for npm provenance

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: testpass
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: bun install

      - name: Seed test database
        run: bun run scripts/seed-dev-data.ts
        env:
          API_KEY: test-ci-key
          ENCRYPTION_KEY: abcdefghijklmnopqrstuvwxyz123456
          MONGODB_URI: "mongodb://admin:testpass@localhost:27017/rebalance-test?authSource=admin"

      - name: Run tests
        run: bun run test
        env:
          API_KEY: test-ci-key
          API_PORT: "3001"
          ENCRYPTION_KEY: abcdefghijklmnopqrstuvwxyz123456
          MONGODB_URI: "mongodb://admin:testpass@localhost:27017/rebalance-test?authSource=admin"
          REBALANCE_THRESHOLD: "5"
          REBALANCE_COOLDOWN_HOURS: "1"
          MIN_TRADE_USD: "10"
          MAX_TRADE_USD: "5000"
          DAILY_LOSS_LIMIT_PCT: "10"

      - name: Run linting
        run: bun run lint
        continue-on-error: true

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release || echo "semantic-release not configured, skipping"

      - name: Send release notification to Discord
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/send-discord-release.cjs production