name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test ./src/ --path-ignore-patterns='**/*.isolated.test.ts'
        env:
          API_KEY: test-ci-key
          ENCRYPTION_KEY: abcdefghijklmnopqrstuvwxyz123456
          PAPER_TRADING: "true"
          DATABASE_URL: "file:data/ci-test.db"

      - name: Run coverage
        run: bun test ./src/ --path-ignore-patterns='**/*.isolated.test.ts' --coverage --coverage-reporter=lcov --coverage-dir=coverage
        env:
          API_KEY: test-ci-key
          ENCRYPTION_KEY: abcdefghijklmnopqrstuvwxyz123456
          PAPER_TRADING: "true"
          DATABASE_URL: "file:data/ci-test.db"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/lcov.info

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun run test

      - name: Run coverage
        run: bun run test:cov

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
